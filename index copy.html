<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardians of Gaia — Lobby</title>
  <meta name="description"
    content="A collaborative D&D platform for science education. Join your party and embark on an epic learning adventure." />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/start.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
  <canvas id="particle-canvas"></canvas>

  <div class="start-page">
    <!-- ─── Top Nav ─────────────────────────────── -->
    <nav class="top-nav">
      <span class="nav-logo decorative">⚔ Guardians of Gaia</span>
      <div class="nav-links">
        <a href="teacher.html" class="btn btn-ghost" style="font-size:0.8rem">⚙ Teacher Settings</a>
      </div>
    </nav>

    <!-- ─── Main Layout ───────────────────────────── -->
    <div class="start-layout">

      <!-- Left Sidebar -->
      <aside class="start-sidebar">
        <div>
          <div class="sidebar-section-title">🧙 Adventurers</div>
          <div class="players-section" id="player-list">
            <!-- Player slots populated by JS -->
          </div>
          <div class="add-player-form" style="margin-top:8px">
            <input type="text" id="new-player-name" placeholder="Enter name…" maxlength="20" />
            <button class="btn btn-purple" onclick="addPlayer()" id="add-player-btn">+</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="sidebar-actions">
          <button type="button" class="btn btn-gold start-btn" id="start-btn"
            onclick="event.preventDefault(); startGame()" disabled>
            ⚔ Begin Adventure
          </button>
          <button type="button" class="btn btn-ghost mic-check-btn" id="mic-check-btn"
            onclick="event.preventDefault(); runMicCheck()">
            🎤 Mic Check
          </button>
          <div class="mic-status" id="mic-status">
            <div class="mic-dot" id="mic-dot"></div>
            <span id="mic-status-text">Mic not tested</span>
          </div>
        </div>
      </aside>

      <!-- Right Panel — Lesson Preview -->
      <main class="lesson-panel" id="lesson-panel">
        <!-- Populated by JS -->
      </main>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="js/app.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/start.js"></script>
</body>

</html>
